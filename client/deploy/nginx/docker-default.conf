server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache the HTML shell: each deploy changes hashed filenames under /static/.
    # Stale index.html + immutable old JS = blank app after redeploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        expires off;
    }

    location /static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
