# Static SPA for Create React App (client-side routing).
# Install: copy to /etc/nginx/sites-available/ on Debian/Ubuntu, enable symlink,
# or use /etc/nginx/conf.d/ on Amazon Linux 2023.
#
# Before enabling: replace YOUR_DOMAIN_OR_IP with the EC2 public DNS or IP.
# After TLS: add ssl_certificate / ssl_certificate_key and listen 443 ssl.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_OR_IP;

    root /var/www/ai-gateway-client;
    index index.html;

    # CRA hashed assets — safe to cache long-term
    location /static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
