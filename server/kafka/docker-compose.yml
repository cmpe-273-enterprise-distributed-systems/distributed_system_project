# Single-broker Kafka — run this on the one designated Kafka host laptop.
#
# Setup:
#     cd server/kafka && cp .env.example .env
#     # Edit KAFKA_ADVERTISED_HOST to this laptop's Tailscale IP
#     docker compose up -d
#
# All other laptops (leader, workers) set KAFKA_BROKER=<this laptop's Tailscale IP>:9092
# in their server/leader/.env or server/worker/.env.
#
# Cassandra is NOT included here — it lives in ../../docker-compose.yml at the repo
# root and should run on exactly one designated host: docker compose up cassandra

services:
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-broker
    hostname: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"   # clients across Tailscale VPN
      - "9093:9093"   # KRaft controller (local only)
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:?KAFKA_CLUSTER_ID is required}
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_LISTENERS: CONTROLLER://kafka:9093,INSIDE://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:29092,OUTSIDE://${KAFKA_ADVERTISED_HOST:?KAFKA_ADVERTISED_HOST is required (this laptop's Tailscale IP)}:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: OUTSIDE
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      - kafka
    entrypoint: []
    command:
      - /bin/sh
      - -c
      - |
        until kafka-topics --bootstrap-server kafka:29092 --list > /dev/null 2>&1; do
          echo 'Waiting for Kafka...'; sleep 2
        done
        for topic in tasks-high-ram tasks-low-ram tasks-general completed-tasks; do
          kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
              --topic "$$topic" --partitions 4 --replication-factor 1
        done
        echo 'Topics ready: tasks-high-ram, tasks-low-ram, tasks-general, completed-tasks'

volumes:
  kafka_data:
